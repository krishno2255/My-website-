<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Futuristic Vault</title>
  <style>
    /* Electric Embassy Cyberpunk Theme UI Style */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #0a0b10; color: #e2e8f0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    
    .vault-container { width: 100%; max-width: 900px; background: rgba(16, 18, 27, 0.4); backdrop-filter: blur(16px); border: 2px solid #00f0ff; border-radius: 16px; padding: 30px; box-shadow: 0 0 25px rgba(0, 240, 255, 0.2), inset 0 0 15px rgba(0, 240, 255, 0.1); }
    
    h1 { text-align: center; color: #00f0ff; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.6); font-size: 24px; }
    
    /* Upload Section Stylers */
    .upload-zone { border: 2px dashed #ff007f; padding: 40px 20px; border-radius: 12px; text-align: center; background: rgba(255, 0, 127, 0.03); cursor: pointer; transition: 0.3s; margin-bottom: 30px; box-shadow: 0 0 10px rgba(255, 0, 127, 0.05); }
    .upload-zone:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.03); box-shadow: 0 0 20px rgba(0, 240, 255, 0.2); }
    .upload-zone p { color: #8a99ad; font-size: 16px; }
    
    /* Navigation Grid Categories */
    .nav-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
    .tab-btn { background: #121620; border: 1px solid #3b4252; padding: 15px; border-radius: 8px; color: #8a99ad; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; transition: 0.3s; text-align: center; }
    .tab-btn:hover, .tab-btn.active { border-color: #00f0ff; color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); background: rgba(0, 240, 255, 0.05); }
    
    /* File Storage Grid Viewer */
    .storage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .file-card { background: #11141d; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 15px; text-align: center; position: relative; transition: 0.3s; }
    .file-card:hover { transform: translateY(-5px); border-color: #ff007f; box-shadow: 0 0 15px rgba(255, 0, 127, 0.2); }
    .file-icon { font-size: 40px; margin-bottom: 10px; display: block; }
    .file-name { font-size: 14px; color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 11px; color: #6272a4; margin-top: 5px; }
  </style>
</head>
<body>

<div class="vault-container">
  <h1>Electric Embassy Personal Storage</h1>
  
  <!-- ফাইল ড্রপ/আপলোড এরিয়া -->
  <div class="upload-zone" id="uploadZone">
    <span style="font-size: 40px; display:block; margin-bottom:10px;">⚡</span>
    <p>আপনার ফাইল এখানে ড্র্যাগ করুন অথবা ক্লিক করে আপলোড করুন</p>
    <input type="file" id="fileInput" style="display: none;" multiple>
  </div>
  
  <!-- ক্যাটাগরি ট্যাবসমূহ -->
  <div class="nav-tabs">
    <div class="tab-btn active">📷 ছবি (Images)</div>
    <div class="tab-btn">🎥 ভিডিও (Videos)</div>
    <div class="tab-btn">📄 ডকুমেন্ট (Docs)</div>
  </div>
  
  <!-- স্টোরেজ গ্রিড (ডেমো ফাইল) -->
  <div class="storage-grid">
    <div class="file-card">
      <span class="file-icon">🖼️</span>
      <div class="file-name">My_Photo.jpg</div>
      <div class="file-size">2.4 MB</div>
    </div>
    <div class="file-card">
      <span class="file-icon">🎬</span>
      <div class="file-name">Personal_Vlog.mp4</div>
      <div class="file-size">45.8 MB</div>
    </div>
    <div class="file-card">
      <span class="file-icon">📝</span>
      <div class="file-name">Secret_Notes.pdf</div>
      <div class="file-size">512 KB</div>
    </div>
  </div>
</div>

<script>
  // ক্লিক করে ফাইল সিলেক্ট করার সিম্পল মেকানিজম
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  
  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    alert(`${e.target.files.length} টি ফাইল আপলোডের জন্য সিলেক্ট করা হয়েছে!`);
  });
</script>

</body>
</html>
